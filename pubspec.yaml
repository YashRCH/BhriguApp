name: astrology_guru_app
description: BHR1GU - AI-powered Vedic and Western astrology guru
publish_to: 'none'
version: 1.0.3+15

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.3
  cloud_firestore: ^6.6.0
  google_sign_in: ^6.2.1

  # Navigation
  go_router: ^13.0.1

  # State management
  flutter_riverpod: ^2.4.9

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # Audio
  just_audio: ^0.9.36

  # Fonts
  google_fonts: ^6.1.0

  # Storage
  path_provider: ^2.1.5

  # Shimmer
  shimmer: ^3.0.0

  # Splash
  flutter_native_splash: ^2.3.9

  # Icons
  cupertino_icons: ^1.0.2

  # UUID
  uuid: ^4.3.3

  # Package info
  package_info_plus: ^9.0.1

  # =========================
  # BHR1GU COSMIC BLUEPRINT
  # =========================

  # Animations
  flutter_animate: ^4.5.0

  # Local caching
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # SVG zodiac glyphs
  flutter_svg: ^2.0.10+1

  # Blur / glow effects
  blur: ^3.1.0

  # Date formatting
  intl: ^0.19.0

  # Custom painter helpers
  vector_math: ^2.1.4

  # Optional page indicators
  smooth_page_indicator: ^1.1.0

  # Optional glassmorphism
  glassmorphism: ^3.0.0

  # Gradient borders
  gradient_borders: ^1.0.0
  cloud_functions: ^6.3.3
  share_plus: ^7.2.2
  firebase_app_check: ^0.4.5
  firebase_crashlytics: ^5.2.4
  firebase_messaging: ^16.4.0
  flutter_local_notifications: ^18.0.1
  url_launcher: 6.2.5
  purchases_flutter: ^8.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

  flutter_launcher_icons: ^0.13.1

  # Hive generator
  hive_generator: ^2.0.1

  # Code generation
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/tarot/
    - assets/zodiac/
    - assets/planets/
    - assets/animations/
    - assets/images/
    - assets/images/owl/frames/idle/
    - assets/images/owl/frames/blink/
    - assets/images/owl/frames/takeoff/
    - assets/images/owl/frames/flying/
    - assets/images/owl/frames/landing/
    - assets/images/owl/frames/walking/
    - assets/images/owl/frames/sleeping/
    - assets/images/owl/frames/alerted/
    - assets/images/owl/frames/waking_up/
    - assets/images/owl/frames/nesting/
    - assets/images/owl/frames/perching/
    - assets/images/owl/frames/grooming/
    - assets/images/owl/frames/writing/
    - assets/images/owl/frames/eating/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0D0B1E"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
